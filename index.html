<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Editor</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="control-panel">
        <button
          id="preview-new-tab-btn"
          class="app-button control-btn"
          type="button"
        >
          <span class="app-button__icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              focusable="false"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3.5" y="5" width="7" height="14" rx="2"></rect>
              <path d="M13.5 8.5h7"></path>
              <path d="M13.5 12h7"></path>
              <path d="M13.5 15.5h5.5"></path>
            </svg>
          </span>
          <span class="app-button__label">Preview</span>
        </button>
        <button
          id="download-markdown-btn"
          class="app-button control-btn"
          type="button"
        >
          <span class="app-button__icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              focusable="false"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 6.5h16v11H4z"></path>
              <path d="M7.5 14.5v-5l2.5 3 2.5-3v5"></path>
              <path d="M15.5 10.5v4"></path>
              <path d="m13.75 12.75 1.75 1.75 1.75-1.75"></path>
            </svg>
          </span>
          <span class="app-button__label">Download Markdown</span>
        </button>
      </div>
      <div class="editor-container single-pane" id="editor-container">
        <div class="editor-wrapper full-width" id="editor-pane">
          <div class="editor-content">
            <textarea
              id="markdown-input"
              aria-label="Markdown editor"
              placeholder="Write Markdown here..."
            ></textarea>
          </div>
        </div>
        <div class="preview-pane" id="preview-pane" hidden>
          <iframe
            id="preview-iframe"
            class="preview-iframe"
            title="Markdown preview"
          ></iframe>
        </div>
      </div>
      <div class="split-actions" id="split-actions" hidden role="toolbar" aria-label="Preview actions">
        <div class="split-view-modes" role="group" aria-label="Preview layout">
          <button
            class="app-button split-view-btn is-active"
            id="split-view-balanced"
            type="button"
            aria-pressed="true"
            title="Editor and preview use equal width"
          >
            <span class="app-button__icon" aria-hidden="true">
              <svg
                viewBox="0 0 24 24"
                focusable="false"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3.5" y="5" width="6.5" height="14" rx="1.8"></rect>
                <rect x="14" y="5" width="6.5" height="14" rx="1.8"></rect>
              </svg>
            </span>
            <span class="app-button__label">1:1</span>
          </button>
          <button
            class="app-button split-view-btn"
            id="split-view-preview-focus"
            type="button"
            aria-pressed="false"
            title="Keep editor width unchanged and expand preview to twice the width"
          >
            <span class="app-button__icon" aria-hidden="true">
              <svg
                viewBox="0 0 24 24"
                focusable="false"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3.5" y="5" width="4.5" height="14" rx="1.6"></rect>
                <rect x="11" y="5" width="9.5" height="14" rx="1.8"></rect>
              </svg>
            </span>
            <span class="app-button__label">1:2</span>
          </button>
        </div>
        <button
          class="app-button split-action-btn"
          id="action-paged-pdf"
          type="button"
        >
          <span class="app-button__icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              focusable="false"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M8 3.5h6l4 4V20a.5.5 0 0 1-.5.5h-11A.5.5 0 0 1 6 20V4a.5.5 0 0 1 .5-.5H8z"
              ></path>
              <path d="M14 3.5V8h4"></path>
              <path d="M9 12.5h6"></path>
              <path d="M9 16h4.5"></path>
            </svg>
          </span>
          <span class="app-button__label">Export PDF (paged)</span>
        </button>
        <button
          class="app-button split-action-btn"
          id="action-single-pdf"
          type="button"
        >
          <span class="app-button__icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              focusable="false"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="5" y="4" width="11" height="15" rx="2"></rect>
              <path d="M9 8h3.5"></path>
              <path d="M9 11.5h5"></path>
              <path d="M9 15h4"></path>
              <path d="M17 8.5h2.5"></path>
              <path d="M17 12h2.5"></path>
              <path d="M17 15.5h2.5"></path>
            </svg>
          </span>
          <span class="app-button__label">Save PDF (single page)</span>
        </button>
        <button
          class="app-button split-action-btn"
          id="action-copy"
          type="button"
        >
          <span class="app-button__icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              focusable="false"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="9" y="7" width="10" height="12" rx="2"></rect>
              <path
                d="M15 7V5.5A1.5 1.5 0 0 0 13.5 4h-7A1.5 1.5 0 0 0 5 5.5v9A1.5 1.5 0 0 0 6.5 16H9"
              ></path>
            </svg>
          </span>
          <span class="app-button__label">Copy rich text</span>
        </button>
        <button
          class="app-button split-action-btn"
          id="action-long-image"
          type="button"
        >
          <span class="app-button__icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              focusable="false"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3.5" y="5" width="17" height="14" rx="2"></rect>
              <circle cx="9" cy="10" r="1.5"></circle>
              <path d="m6.5 17 4.5-4.5 3.5 3.5 2.5-2.5 3 3"></path>
            </svg>
          </span>
          <span class="app-button__label">Export long image</span>
        </button>
        <button
          class="app-button split-action-btn"
          id="action-new-tab"
          type="button"
        >
          <span class="app-button__icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              focusable="false"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M14 5h5v5"></path>
              <path d="M10 14 19 5"></path>
              <path
                d="M19 13v5.5a.5.5 0 0 1-.5.5H5.5a.5.5 0 0 1-.5-.5V5.5a.5.5 0 0 1 .5-.5H11"
              ></path>
            </svg>
          </span>
          <span class="app-button__label">New tab preview</span>
        </button>
      </div>
    </div>
    <footer class="app-footer">
      <button
        id="history-toggle-btn"
        class="app-button app-button--icon-only footer-link"
        aria-label="History"
        title="History"
        type="button"
      >
        <span class="app-button__icon" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            focusable="false"
            fill="none"
            stroke="currentColor"
            stroke-width="1.7"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M4.5 12a7.5 7.5 0 1 0 2.2-5.3"></path>
            <path d="M4.5 5.5v4h4"></path>
            <path d="M12 8.5V12l2.75 1.75"></path>
          </svg>
        </span>
        <span class="sr-only">History</span>
      </button>
      <a
        class="app-button app-button--icon-only footer-link"
        href="https://github.com/formyvibecoding/markdowneditor/tree/main"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="GitHub Repository"
      >
        <span class="app-button__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false" fill="currentColor">
            <path
              d="M12 0.5C5.37 0.5 0 5.87 0 12.5c0 5.29 3.438 9.78 8.205 11.366.6.11.82-.261.82-.579 0-.286-.01-1.045-.016-2.052-3.338.726-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.729.083-.729 1.205.085 1.84 1.238 1.84 1.238 1.07 1.834 2.809 1.305 3.495.998.108-.775.418-1.305.762-1.605-2.665-.304-5.467-1.332-5.467-5.93 0-1.31.468-2.381 1.236-3.221-.124-.303-.536-1.523.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.655 1.653.243 2.873.12 3.176.77.84 1.235 1.911 1.235 3.221 0 4.61-2.807 5.624-5.479 5.921.43.371.815 1.102.815 2.222 0 1.604-.015 2.896-.015 3.286 0 .32.216.694.825.576C20.565 22.276 24 17.79 24 12.5 24 5.87 18.627 0.5 12 0.5z"
            ></path>
          </svg>
        </span>
        <span class="sr-only">GitHub Repository</span>
      </a>
    </footer>

    <div id="history-overlay" class="history-overlay" hidden>
      <aside
        id="history-panel"
        class="history-panel"
        aria-label="History panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="history-title"
      >
        <div class="history-panel-header">
          <h2 id="history-title">History</h2>
          <div class="history-header-actions">
            <button
              id="history-clear-btn"
              class="app-button history-action-btn"
              type="button"
            >
              <span class="app-button__icon" aria-hidden="true">
                <svg
                  viewBox="0 0 24 24"
                  focusable="false"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M4.5 7.5h15"></path>
                  <path d="M9.5 3.5h5"></path>
                  <path
                    d="M8 7.5v11a1.5 1.5 0 0 0 1.5 1.5h5A1.5 1.5 0 0 0 16 18.5v-11"
                  ></path>
                  <path d="M10 10.5v5"></path>
                  <path d="M14 10.5v5"></path>
                </svg>
              </span>
              <span class="app-button__label">Clear all</span>
            </button>
            <button
              id="history-close-btn"
              class="app-button app-button--icon-only history-action-btn history-close-btn"
              type="button"
              aria-label="Close history"
            >
              <span class="app-button__icon" aria-hidden="true">
                <svg
                  viewBox="0 0 24 24"
                  focusable="false"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.9"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="m7 7 10 10"></path>
                  <path d="M17 7 7 17"></path>
                </svg>
              </span>
              <span class="sr-only">Close history</span>
            </button>
          </div>
        </div>
        <div id="history-list" class="history-list"></div>
      </aside>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
