<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 编辑器</title>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
    <div class="container">
        <div class="control-panel">
            <button id="preview-new-tab-btn" class="control-btn">预览</button>
            <button id="download-markdown-btn" class="control-btn">下载</button>
        </div>
        <div class="editor-container single-pane" id="editor-container">
            <div class="editor-wrapper full-width" id="editor-pane">
                <div class="editor-content">
                    <textarea id="markdown-input" placeholder="在这里输入 Markdown 内容..."></textarea>
                </div>
            </div>
            <div class="preview-pane" id="preview-pane" hidden>
                <button id="preview-close-btn" class="preview-close-float" type="button" title="关闭预览" aria-label="关闭预览">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <iframe id="preview-iframe" class="preview-iframe" title="Markdown 预览"></iframe>
            </div>
        </div>
        <div class="split-actions" id="split-actions" hidden>
            <button class="split-action-btn" id="action-paged-pdf" type="button">下载 PDF（分页）</button>
            <button class="split-action-btn" id="action-single-pdf" type="button">保存 PDF（单页）</button>
            <button class="split-action-btn" id="action-copy" type="button">复制预览</button>
            <button class="split-action-btn" id="action-long-image" type="button">导出长图</button>
            <button class="split-action-btn" id="action-new-tab" type="button">在新页面预览</button>
        </div>
    </div>
    <footer class="app-footer">
        <button id="history-toggle-btn" class="footer-link" aria-label="历史记录" title="历史记录" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M13 3a9 9 0 1 0 8.95 10h-2.02A7 7 0 1 1 13 5a6.96 6.96 0 0 1 4.95 2.05L15 10h7V3l-2.65 2.65A8.95 8.95 0 0 0 13 3zm-1 5v5.59l4.3 2.48 1-1.73-3.3-1.9V8H12z"/>
            </svg>
        </button>
        <a class="footer-link" href="https://github.com/formyvibecoding/markdowneditor/tree/main" target="_blank" rel="noopener noreferrer" aria-label="GitHub Repository">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 0.5C5.37 0.5 0 5.87 0 12.5c0 5.29 3.438 9.78 8.205 11.366.6.11.82-.261.82-.579 0-.286-.01-1.045-.016-2.052-3.338.726-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.729.083-.729 1.205.085 1.84 1.238 1.84 1.238 1.07 1.834 2.809 1.305 3.495.998.108-.775.418-1.305.762-1.605-2.665-.304-5.467-1.332-5.467-5.93 0-1.31.468-2.381 1.236-3.221-.124-.303-.536-1.523.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.655 1.653.243 2.873.12 3.176.77.84 1.235 1.911 1.235 3.221 0 4.61-2.807 5.624-5.479 5.921.43.371.815 1.102.815 2.222 0 1.604-.015 2.896-.015 3.286 0 .32.216.694.825.576C20.565 22.276 24 17.79 24 12.5 24 5.87 18.627 0.5 12 0.5z"/>
            </svg>
        </a>
    </footer>

    <div id="history-overlay" class="history-overlay" hidden>
        <aside id="history-panel" class="history-panel" aria-label="历史记录弹窗" role="dialog" aria-modal="true" aria-labelledby="history-title">
            <div class="history-panel-header">
                <h2 id="history-title">历史记录</h2>
                <div class="history-header-actions">
                    <button id="history-clear-btn" class="history-action-btn" type="button">清空全部</button>
                    <button id="history-close-btn" class="history-action-btn history-close-btn" type="button" aria-label="关闭历史记录">×</button>
                </div>
            </div>
            <div id="history-list" class="history-list"></div>
        </aside>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
